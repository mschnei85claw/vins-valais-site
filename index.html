<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dégustation Vins Valais | Le Portail de tout le Canton</title>
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Image de fond : Vignes du Valais */
        .bg-image {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
            url('https://images.unsplash.com/photo-1504275107627-0c2ba7a43dba?q=80&w=1920&auto=format&fit=crop');
            height: 100%; background-position: center; background-repeat: no-repeat; background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }

        .content { color: white; text-align: center; padding: 20px; max-width: 900px; }
        
        h1 { font-size: 3.5em; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: #e63946; }
        
        .subtitle { font-size: 1.5em; margin-bottom: 30px; font-weight: 300; }
        
        .grid-valais { display: flex; justify-content: space-around; margin-bottom: 40px; font-size: 0.9em; color: #ddd; text-transform: uppercase; }
        
        .btn-main { background-color: #e63946; color: white; padding: 18px 40px; text-decoration: none; 
                    border-radius: 50px; font-weight: bold; font-size: 1.1em; transition: 0.3s; border: 2px solid transparent; }
        .btn-main:hover { background-color: transparent; border-color: white; }

        .footer { position: absolute; bottom: 20px; width: 100%; text-align: center; color: rgba(255,255,255,0.5); font-size: 0.8em; }
    </style>
</head>
<body>

<div class="bg-image">
    <div class="content">
        <h1>Dégustation Vins <span>Valais</span></h1>
        <p class="subtitle">Le portail de référence des 5000 hectares de vignoble, de Martigny à Viège.</p>
        
        <div class="grid-valais">
            <span>Sierre</span> • <span>Sion</span> • <span>Fully</span> • <span>Chamoson</span> • <span>Salquenen</span>
        </div>

        <a href="mailto:contact@degustation-vins-valais.ch" class="btn-main">Inscrire ma Cave Valaisanne</a>
    </div>
</div>

<div class="footer">
    © 2026 Michel S. | Passionnément Valaisan
</div>

</body>
</html>
